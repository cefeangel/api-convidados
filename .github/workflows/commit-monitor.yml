name: 🔍 Monitoramento de Commits

on:
  push:
    branches: ["**"]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  issues: write
  pull-requests: write
  security-events: write

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Identificar autor e coletar metadados
  # ─────────────────────────────────────────────
  commit-metadata:
    name: 📋 Coletar Metadados do Commit
    runs-on: ubuntu-latest
    outputs:
      author_name:    ${{ steps.meta.outputs.author_name }}
      author_email:   ${{ steps.meta.outputs.author_email }}
      commit_sha:     ${{ steps.meta.outputs.commit_sha }}
      commit_message: ${{ steps.meta.outputs.commit_message }}
      branch:         ${{ steps.meta.outputs.branch }}
      files_changed:  ${{ steps.meta.outputs.files_changed }}
      timestamp:      ${{ steps.meta.outputs.timestamp }}

    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Extrair Metadados
        id: meta
        run: |
          AUTHOR_NAME=$(git log -1 --format="%an")
          AUTHOR_EMAIL=$(git log -1 --format="%ae")
          COMMIT_SHA=$(git rev-parse HEAD)
          COMMIT_MSG=$(git log -1 --format="%s")
          BRANCH=${GITHUB_REF#refs/heads/}
          FILES_CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | wc -l || echo "1")
          TIMESTAMP=$(git log -1 --format="%ci")

          echo "author_name=$AUTHOR_NAME"     >> $GITHUB_OUTPUT
          echo "author_email=$AUTHOR_EMAIL"   >> $GITHUB_OUTPUT
          echo "commit_sha=$COMMIT_SHA"       >> $GITHUB_OUTPUT
          echo "commit_message=$COMMIT_MSG"   >> $GITHUB_OUTPUT
          echo "branch=$BRANCH"               >> $GITHUB_OUTPUT
          echo "files_changed=$FILES_CHANGED" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP"         >> $GITHUB_OUTPUT

          echo "### 📋 Metadados do Commit" >> $GITHUB_STEP_SUMMARY
          echo "| Campo          | Valor                    |" >> $GITHUB_STEP_SUMMARY
          echo "|----------------|--------------------------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Autor**      | $AUTHOR_NAME             |" >> $GITHUB_STEP_SUMMARY
          echo "| **E-mail**     | $AUTHOR_EMAIL            |" >> $GITHUB_STEP_SUMMARY
          echo "| **SHA**        | \`${COMMIT_SHA:0:8}\`    |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch**     | $BRANCH                  |" >> $GITHUB_STEP_SUMMARY
          echo "| **Mensagem**   | $COMMIT_MSG              |" >> $GITHUB_STEP_SUMMARY
          echo "| **Arquivos**   | $FILES_CHANGED alterados |" >> $GITHUB_STEP_SUMMARY
          echo "| **Timestamp**  | $TIMESTAMP               |" >> $GITHUB_STEP_SUMMARY

      - name: Listar Arquivos Alterados
        run: |
          echo "### 📂 Arquivos Alterados" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          git diff --stat HEAD~1 HEAD 2>/dev/null || git show --stat HEAD
          git diff --stat HEAD~1 HEAD 2>/dev/null >> $GITHUB_STEP_SUMMARY || \
            git show --stat HEAD >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # JOB 2: Análise de Qualidade de Código
  # Suporte: JavaScript, TypeScript, HTML, CSS,
  #          PHP, Python, Go — simultâneos
  # ─────────────────────────────────────────────
  code-quality:
    name: 🧹 Análise de Qualidade de Código
    runs-on: ubuntu-latest
    needs: commit-metadata

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detectar Linguagens do Projeto
        id: detect-lang
        run: |
          HAS_JS=false;  HAS_PHP=false;   HAS_PY=false
          HAS_GO=false;  HAS_HTML=false;  HAS_CSS=false
          HAS_KT=false;  HAS_SWIFT=false
          [ -f "package.json" ] && HAS_JS=true
          find . -not -path "*/node_modules/*" -not -path "*/.github/*" -not -path "*/vendor/*" \
            -name "*.js" -o -name "*.ts" -o -name "*.jsx" -o -name "*.tsx" 2>/dev/null | grep -q . && HAS_JS=true
          find . -not -path "*/node_modules/*" -not -path "*/.github/*" -not -path "*/vendor/*" \
            -name "*.php" -maxdepth 5 2>/dev/null | grep -q . && HAS_PHP=true
          find . -not -path "*/node_modules/*" -not -path "*/.github/*" \
            -name "*.html" -o -name "*.htm" 2>/dev/null | grep -q . && HAS_HTML=true
          find . -not -path "*/node_modules/*" -not -path "*/.github/*" \
            -name "*.css" -o -name "*.scss" -o -name "*.sass" 2>/dev/null | grep -q . && HAS_CSS=true
          { [ -f "requirements.txt" ] || [ -f "pyproject.toml" ]; } && HAS_PY=true
          [ -f "go.mod" ] && HAS_GO=true
          find . -not -path "*/.github/*" -not -path "*/build/*" \
            -name "*.kt" -o -name "*.kts" 2>/dev/null | grep -q . && HAS_KT=true
          find . -not -path "*/.github/*" -not -path "*/build/*" \
            -name "*.swift" 2>/dev/null | grep -q . && HAS_SWIFT=true
          echo "has_js=$HAS_JS"       >> $GITHUB_OUTPUT
          echo "has_php=$HAS_PHP"     >> $GITHUB_OUTPUT
          echo "has_html=$HAS_HTML"   >> $GITHUB_OUTPUT
          echo "has_css=$HAS_CSS"     >> $GITHUB_OUTPUT
          echo "has_py=$HAS_PY"       >> $GITHUB_OUTPUT
          echo "has_go=$HAS_GO"       >> $GITHUB_OUTPUT
          echo "has_kt=$HAS_KT"       >> $GITHUB_OUTPUT
          echo "has_swift=$HAS_SWIFT" >> $GITHUB_OUTPUT
          echo "### 🔎 Linguagens detectadas" >> $GITHUB_STEP_SUMMARY
          echo "| Linguagem | Presente |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| JavaScript / TypeScript | $HAS_JS |"   >> $GITHUB_STEP_SUMMARY
          echo "| HTML | $HAS_HTML |"                    >> $GITHUB_STEP_SUMMARY
          echo "| CSS / SCSS | $HAS_CSS |"               >> $GITHUB_STEP_SUMMARY
          echo "| PHP | $HAS_PHP |"                      >> $GITHUB_STEP_SUMMARY
          echo "| Python | $HAS_PY |"                    >> $GITHUB_STEP_SUMMARY
          echo "| Go | $HAS_GO |"                        >> $GITHUB_STEP_SUMMARY
          echo "| Kotlin (Android) | $HAS_KT |"          >> $GITHUB_STEP_SUMMARY
          echo "| Swift (iOS) | $HAS_SWIFT |"            >> $GITHUB_STEP_SUMMARY

      # ── JavaScript / TypeScript / HTML / CSS ──
      # Regras embutidas — não precisa de arquivo de config no projeto
      - name: Setup Node.js
        if: steps.detect-lang.outputs.has_js == 'true' || steps.detect-lang.outputs.has_html == 'true' || steps.detect-lang.outputs.has_css == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar ferramentas JS/HTML/CSS
        if: steps.detect-lang.outputs.has_js == 'true' || steps.detect-lang.outputs.has_html == 'true' || steps.detect-lang.outputs.has_css == 'true'
        run: |
          npm install -g htmlhint stylelint stylelint-config-standard eslint 2>/dev/null || true
          [ -f "package.json" ] && (npm ci --prefer-offline 2>/dev/null || npm install) || true

      - name: ESLint — JavaScript / TypeScript (regras embutidas)
        if: steps.detect-lang.outputs.has_js == 'true'
        continue-on-error: true
        run: |
          echo "### 🔍 ESLint — JavaScript / TypeScript" >> $GITHUB_STEP_SUMMARY

          # Instala ESLint v8 (suporta --no-eslintrc e .eslintrc.json)
          npm install -g eslint@8 2>/dev/null || true

          # Gera config embutida via jq (sem heredoc nem python multiline)
          jq -n '{
            env: {node:true, browser:true, es2022:true, commonjs:true},
            parserOptions: {ecmaVersion:2022},
            rules: {
              "no-undef": "error",
              "no-unused-vars": "warn",
              "no-redeclare": "error",
              "no-unreachable": "error",
              "no-duplicate-case": "error",
              "no-constant-condition": "error",
              "no-eval": "error",
              "no-implied-eval": "error",
              "no-new-func": "error",
              "eqeqeq": ["error","always"],
              "no-var": "error",
              "prefer-const": "warn",
              "use-isnan": "error",
              "no-empty": "warn",
              "semi": ["warn","always"]
            },
            ignorePatterns: ["node_modules/","dist/","build/","vendor/","*.min.js"]
          }' > /tmp/eslintrc-ci.json

          # Usa config do projeto se existir, senão usa a embutida
          if ls .eslintrc* eslint.config* 2>/dev/null | grep -q .; then
            echo "📋 Usando configuracao ESLint do projeto" >> $GITHUB_STEP_SUMMARY
            ESLINT_OUT=$(eslint . --ext .js,.ts,.jsx,.tsx --format=compact 2>&1) || true
          else
            echo "📋 Usando regras embutidas (sem .eslintrc no projeto)" >> $GITHUB_STEP_SUMMARY
            ESLINT_OUT=$(eslint . --ext .js,.ts,.jsx,.tsx --format=compact \
              --no-eslintrc -c /tmp/eslintrc-ci.json \
              --ignore-pattern "node_modules/" --ignore-pattern "dist/" --ignore-pattern "vendor/" \
              2>&1) || true
          fi

          echo "$ESLINT_OUT" | tail -30 >> $GITHUB_STEP_SUMMARY

          # Conta erros reais (não warnings)
          ERRORS=$(echo "$ESLINT_OUT" | grep -c " Error - " || echo "0")
          WARNINGS=$(echo "$ESLINT_OUT" | grep -c " Warning - " || echo "0")
          PROBLEMS=$(echo "$ESLINT_OUT" | grep -oP '\d+(?= problem)' | head -1 || echo "0")

          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$ERRORS" -gt 0 ] 2>/dev/null; then
            echo "❌ **$ERRORS erro(s) encontrado(s)** — qualidade de código reprovada" >> $GITHUB_STEP_SUMMARY
            echo "has_lint_error=true" >> $GITHUB_ENV
          else
            echo "✅ Nenhum erro de sintaxe. Warnings: $WARNINGS" >> $GITHUB_STEP_SUMMARY
            echo "has_lint_error=false" >> $GITHUB_ENV
          fi

      - name: HTMLHint — HTML (regras embutidas)
        if: steps.detect-lang.outputs.has_html == 'true'
        continue-on-error: true
        run: |
          echo "### 🌐 HTMLHint — HTML" >> $GITHUB_STEP_SUMMARY
          jq -n '{
            "tagname-lowercase":true,"attr-lowercase":true,"attr-value-double-quotes":true,
            "attr-no-duplication":true,"doctype-first":true,"tag-pair":true,
            "spec-char-escape":true,"id-unique":true,"src-not-empty":true,
            "alt-require":true,"doctype-html5":true,"attr-unsafe-chars":true
          }' > /tmp/htmlhintrc-ci.json
          CONFIG_FLAG="--config /tmp/htmlhintrc-ci.json"
          ls .htmlhintrc .htmlhint.js 2>/dev/null | grep -q . && CONFIG_FLAG=""
          HTML_OUT=$(find . -not -path "*/node_modules/*" -not -path "*/.github/*" -not -path "*/vendor/*" \
            \( -name "*.html" -o -name "*.htm" \) -maxdepth 5 | \
            xargs htmlhint $CONFIG_FLAG 2>&1) || true
          echo "$HTML_OUT" | tail -30 >> $GITHUB_STEP_SUMMARY
          HTML_ERRORS=$(echo "$HTML_OUT" | grep -c "error\|Error" || echo "0")
          if [ "$HTML_ERRORS" -gt 0 ] 2>/dev/null; then
            echo "❌ **$HTML_ERRORS erro(s) HTML** encontrado(s)" >> $GITHUB_STEP_SUMMARY
            echo "has_lint_error=true" >> $GITHUB_ENV
          else
            echo "✅ HTML sem erros" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Stylelint — CSS / SCSS (regras embutidas)
        if: steps.detect-lang.outputs.has_css == 'true'
        continue-on-error: true
        run: |
          echo "### 🎨 Stylelint — CSS / SCSS" >> $GITHUB_STEP_SUMMARY
          if ls .stylelintrc* stylelint.config* 2>/dev/null | grep -q .; then
            CSS_OUT=$(find . -not -path "*/node_modules/*" -not -path "*/.github/*" \
              \( -name "*.css" -o -name "*.scss" -o -name "*.sass" \) -maxdepth 5 | \
              xargs npx stylelint 2>&1) || true
          else
            CSS_OUT=$(find . -not -path "*/node_modules/*" -not -path "*/.github/*" \
              \( -name "*.css" -o -name "*.scss" -o -name "*.sass" \) -maxdepth 5 | \
              xargs npx stylelint --config '{"extends":["stylelint-config-standard"]}' 2>&1) || true
          fi
          echo "$CSS_OUT" | tail -30 >> $GITHUB_STEP_SUMMARY
          CSS_ERRORS=$(echo "$CSS_OUT" | grep -c "✖\|error" || echo "0")
          if [ "$CSS_ERRORS" -gt 0 ] 2>/dev/null; then
            echo "❌ **$CSS_ERRORS erro(s) CSS** encontrado(s)" >> $GITHUB_STEP_SUMMARY
            echo "has_lint_error=true" >> $GITHUB_ENV
          else
            echo "✅ CSS sem erros" >> $GITHUB_STEP_SUMMARY
          fi

      # ── PHP ──────────────────────────────────
      - name: Setup PHP
        if: steps.detect-lang.outputs.has_php == 'true'
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: phpcs, phpstan

      - name: PHP_CodeSniffer — PHP (regras embutidas)
        if: steps.detect-lang.outputs.has_php == 'true'
        continue-on-error: true
        run: |
          echo "### 🐘 PHP_CodeSniffer — PHP" >> $GITHUB_STEP_SUMMARY
          if [ -f "phpcs.xml" ] || [ -f ".phpcs.xml" ]; then
            PHPCS_OUT=$(phpcs --extensions=php --ignore=vendor/ . 2>&1) || true
          else
            PHPCS_OUT=$(phpcs --standard=PSR12 --extensions=php --ignore=vendor/ . 2>&1) || true
          fi
          echo "$PHPCS_OUT" | tail -30 >> $GITHUB_STEP_SUMMARY
          PHPCS_ERRORS=$(echo "$PHPCS_OUT" | grep -c "| ERROR |\|FOUND.*ERROR" || echo "0")
          if [ "$PHPCS_ERRORS" -gt 0 ] 2>/dev/null; then
            echo "❌ **$PHPCS_ERRORS erro(s) PHP** encontrado(s) — padrão PSR-12 violado" >> $GITHUB_STEP_SUMMARY
            echo "has_lint_error=true" >> $GITHUB_ENV
          else
            echo "✅ PHP sem erros PSR-12" >> $GITHUB_STEP_SUMMARY
          fi

      - name: PHPStan — Análise Estática PHP (regras embutidas)
        if: steps.detect-lang.outputs.has_php == 'true'
        continue-on-error: true
        run: |
          echo "### 🔬 PHPStan — PHP" >> $GITHUB_STEP_SUMMARY
          find . -name "*.php" -not -path "*/vendor/*" -maxdepth 5 > /tmp/php_files.txt
          if [ -f "phpstan.neon" ] || [ -f "phpstan.neon.dist" ]; then
            STAN_OUT=$(head -20 /tmp/php_files.txt | xargs phpstan analyse --no-progress 2>&1) || true
          else
            STAN_OUT=$(head -20 /tmp/php_files.txt | xargs phpstan analyse --level=5 --no-progress 2>&1) || true
          fi
          echo "$STAN_OUT" | tail -20 >> $GITHUB_STEP_SUMMARY
          STAN_ERRORS=$(echo "$STAN_OUT" | grep -c "Found [^0].*error" || echo "0")
          if [ "$STAN_ERRORS" -gt 0 ] 2>/dev/null; then
            echo "❌ PHPStan encontrou erros" >> $GITHUB_STEP_SUMMARY
            echo "has_lint_error=true" >> $GITHUB_ENV
          else
            echo "✅ PHPStan sem erros" >> $GITHUB_STEP_SUMMARY
          fi

      # ── Python ───────────────────────────────
      - name: Setup Python
        if: steps.detect-lang.outputs.has_py == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Flake8 + Black — Python
        if: steps.detect-lang.outputs.has_py == 'true'
        continue-on-error: true
        run: |
          pip install flake8 black --quiet
          echo "### 🐍 Flake8 — Python" >> $GITHUB_STEP_SUMMARY
          FLAKE_OUT=$(flake8 . --max-line-length=120 --statistics 2>&1) || true
          echo "$FLAKE_OUT" | tail -20 >> $GITHUB_STEP_SUMMARY
          FLAKE_ERRORS=$(echo "$FLAKE_OUT" | grep -c " E[0-9]" || echo "0")
          if [ "$FLAKE_ERRORS" -gt 0 ] 2>/dev/null; then
            echo "❌ **$FLAKE_ERRORS erro(s) Python** encontrado(s)" >> $GITHUB_STEP_SUMMARY
            echo "has_lint_error=true" >> $GITHUB_ENV
          else
            echo "✅ Python sem erros" >> $GITHUB_STEP_SUMMARY
          fi

      # ── Go ───────────────────────────────────
      - name: Setup Go
        if: steps.detect-lang.outputs.has_go == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Go Vet
        if: steps.detect-lang.outputs.has_go == 'true'
        continue-on-error: true
        run: |
          echo "### 🐹 Go Vet" >> $GITHUB_STEP_SUMMARY
          GO_OUT=$(go vet ./... 2>&1) || true
          echo "$GO_OUT" >> $GITHUB_STEP_SUMMARY
          if [ -n "$GO_OUT" ]; then
            echo "❌ Go vet encontrou problemas" >> $GITHUB_STEP_SUMMARY
            echo "has_lint_error=true" >> $GITHUB_ENV
          else
            echo "✅ Go sem erros" >> $GITHUB_STEP_SUMMARY
          fi

      # ── Kotlin (Android) ─────────────────────
      - name: Setup Java para Kotlin
        if: steps.detect-lang.outputs.has_kt == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: ktlint — Kotlin
        if: steps.detect-lang.outputs.has_kt == 'true'
        continue-on-error: true
        run: |
          echo "### 🤖 ktlint — Kotlin / Android" >> $GITHUB_STEP_SUMMARY
          curl -sSLO https://github.com/pinterest/ktlint/releases/latest/download/ktlint
          chmod +x ktlint
          KT_OUT=$(./ktlint --relative --reporter=plain "**/*.kt" "**/*.kts" 2>&1) || true
          echo "$KT_OUT" | grep -v "^$" | head -40 >> $GITHUB_STEP_SUMMARY
          rm -f ktlint
          KT_ERRORS=$(echo "$KT_OUT" | grep -c ":\|error" || echo "0")
          if [ "$KT_ERRORS" -gt 0 ] 2>/dev/null; then
            echo "❌ **$KT_ERRORS problema(s) Kotlin** encontrado(s)" >> $GITHUB_STEP_SUMMARY
            echo "has_lint_error=true" >> $GITHUB_ENV
          else
            echo "✅ Kotlin sem erros" >> $GITHUB_STEP_SUMMARY
          fi

      # ── Swift (iOS) — job separado macos-latest ──
      - name: Swift — Verificacao basica
        if: steps.detect-lang.outputs.has_swift == 'true'
        continue-on-error: true
        run: |
          echo "### 🍎 Swift / iOS — Verificacao" >> $GITHUB_STEP_SUMMARY
          SWIFT_FILES=$(find . -name "*.swift" -not -path "*/.github/*" -not -path "*/build/*" | wc -l)
          echo "Arquivos Swift encontrados: **$SWIFT_FILES**" >> $GITHUB_STEP_SUMMARY
          echo "Analise completa com SwiftLint disponivel no job **swiftlint** (runner macOS)." >> $GITHUB_STEP_SUMMARY
          git diff --name-only HEAD~1 HEAD 2>/dev/null | grep "\.swift$" | \
            awk '{print "- " $0}' >> $GITHUB_STEP_SUMMARY || true

      # ── Verificação final — falha o job se QUALQUER linguagem tiver erros ──
      - name: Resultado final da qualidade de código
        if: always()
        run: |
          if [ "$has_lint_error" = "true" ]; then
            echo "---" >> $GITHUB_STEP_SUMMARY
            echo "## ❌ Qualidade de Código — REPROVADA" >> $GITHUB_STEP_SUMMARY
            echo "Erros encontrados em um ou mais arquivos. Corrija antes de fazer merge." >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "---" >> $GITHUB_STEP_SUMMARY
            echo "## ✅ Qualidade de Código — APROVADA" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Verificar Arquivos de Configuração Sensíveis
        run: |
          echo "### 🔒 Verificação de Arquivos Sensíveis" >> $GITHUB_STEP_SUMMARY
          SENSITIVE_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | \
            grep -E "\.(env|pem|key|p12|pfx|secret)$|id_rsa|id_dsa" || true)
          if [ -n "$SENSITIVE_FILES" ]; then
            echo "⚠️ **ATENÇÃO**: Arquivos potencialmente sensíveis detectados:" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "$SENSITIVE_FILES" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Nenhum arquivo sensível detectado." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Verificar Arquivos Grandes
        run: |
          echo "### 📦 Verificação de Tamanho de Arquivos" >> $GITHUB_STEP_SUMMARY
          LARGE_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | \
            xargs -I{} sh -c 'test -f "{}" && stat -c "%s %n" "{}"' 2>/dev/null | \
            awk '$1 > 1048576 {print $2, "(" int($1/1024) "KB)"}' || true)
          if [ -n "$LARGE_FILES" ]; then
            echo "⚠️ Arquivos maiores que 1MB:" >> $GITHUB_STEP_SUMMARY
            echo "$LARGE_FILES" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Nenhum arquivo muito grande detectado." >> $GITHUB_STEP_SUMMARY
          fi

  # ─────────────────────────────────────────────
  # JOB 3: Scan de Segurança com Trivy
  # ─────────────────────────────────────────────
  security-scan:
    name: 🛡️ Scan de Segurança e Vulnerabilidades
    runs-on: ubuntu-latest
    needs: commit-metadata

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy - Scan de Vulnerabilidades em Dependências
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'

      - name: Upload SARIF ao GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Trivy - Resumo Legível
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'
        continue-on-error: true

      - name: Gerar Resumo de Segurança
        run: |
          echo "### 🛡️ Resumo do Scan de Segurança" >> $GITHUB_STEP_SUMMARY
          echo "Scan realizado com **Trivy** em: \`$(date -u '+%Y-%m-%d %H:%M UTC')\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 Resultados disponíveis na aba **Security → Vulnerability alerts**" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # JOB 4: Scan de Segredos com Gitleaks
  # ─────────────────────────────────────────────
  secrets-scan:
    name: 🔐 Detecção de Segredos Expostos
    runs-on: ubuntu-latest
    needs: commit-metadata

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks - Scan de Segredos
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        continue-on-error: true

      - name: Resumo de Detecção de Segredos
        run: |
          echo "### 🔐 Detecção de Segredos" >> $GITHUB_STEP_SUMMARY
          echo "Scan realizado com **Gitleaks** para detectar:" >> $GITHUB_STEP_SUMMARY
          echo "- API Keys e tokens expostos" >> $GITHUB_STEP_SUMMARY
          echo "- Senhas em texto claro" >> $GITHUB_STEP_SUMMARY
          echo "- Chaves privadas (RSA, SSH)" >> $GITHUB_STEP_SUMMARY
          echo "- Credenciais de banco de dados" >> $GITHUB_STEP_SUMMARY
          echo "- Tokens OAuth e JWT" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # JOB 5: Geração de Relatório Consolidado (IA)
  # ─────────────────────────────────────────────
  generate-report:
    name: 📊 Gerar Relatório com IA
    runs-on: ubuntu-latest
    needs: [commit-metadata, code-quality, security-scan, secrets-scan]
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Coletar Diff do Commit
        id: diff
        run: |
          DIFF=$(git diff HEAD~1 HEAD 2>/dev/null | head -200 || git show HEAD | head -200)
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Gerar Resumo IA via OpenAI API
        id: ai-summary
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AUTHOR: ${{ needs.commit-metadata.outputs.author_name }}
          COMMIT_MSG: ${{ needs.commit-metadata.outputs.commit_message }}
          FILES_CHANGED: ${{ needs.commit-metadata.outputs.files_changed }}
        run: |
          DIFF=$(git diff HEAD~1 HEAD 2>/dev/null | head -60 || git show HEAD | head -60)
          MSG="Analise o commit. Autor:$AUTHOR. Mensagem:$COMMIT_MSG. Arquivos:$FILES_CHANGED. Diff:$DIFF. Responda em portugues: 1-Proposito 2-Impacto 3-Qualidade 4-Riscos"
          PAYLOAD=$(jq -nc --arg m "$MSG" '{"model":"gpt-4o","max_tokens":600,"messages":[{"role":"system","content":"Assistente tecnico, responda em portugues brasileiro."},{"role":"user","content":$m}]}')
          RESPONSE=$(echo "$PAYLOAD" | curl -sf -X POST https://api.openai.com/v1/chat/completions -H "Authorization: Bearer $OPENAI_API_KEY" -H "Content-Type: application/json" -d @- || echo '{"error":{"message":"curl falhou"}}')
          SUMMARY=$(echo "$RESPONSE" | python3 -c "import sys,json;d=json.load(sys.stdin);print(d['choices'][0]['message']['content'] if 'choices' in d else 'Erro: '+str(d.get('error',{}).get('message','')))")
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Gerar Relatório Final Consolidado
        env:
          AUTHOR: ${{ needs.commit-metadata.outputs.author_name }}
          EMAIL: ${{ needs.commit-metadata.outputs.author_email }}
          SHA: ${{ needs.commit-metadata.outputs.commit_sha }}
          BRANCH: ${{ needs.commit-metadata.outputs.branch }}
          COMMIT_MSG: ${{ needs.commit-metadata.outputs.commit_message }}
          FILES: ${{ needs.commit-metadata.outputs.files_changed }}
          TIMESTAMP: ${{ needs.commit-metadata.outputs.timestamp }}
          QUALITY_RESULT: ${{ needs.code-quality.result }}
          SECURITY_RESULT: ${{ needs.security-scan.result }}
          SECRETS_RESULT: ${{ needs.secrets-scan.result }}
          AI_SUMMARY: ${{ steps.ai-summary.outputs.summary }}
        run: |
          STATUS_QUALITY="✅"
          STATUS_SECURITY="✅"
          STATUS_SECRETS="✅"
          [ "$QUALITY_RESULT" != "success" ] && STATUS_QUALITY="⚠️"
          [ "$SECURITY_RESULT" != "success" ] && STATUS_SECURITY="⚠️"
          [ "$SECRETS_RESULT" != "success" ] && STATUS_SECRETS="⚠️"

          cat >> $GITHUB_STEP_SUMMARY << REPORT

          ---
          # 📊 Relatório de Monitoramento de Commit

          ## 👤 Informações do Desenvolvedor
          | Campo       | Valor            |
          |-------------|------------------|
          | **Autor**   | $AUTHOR          |
          | **E-mail**  | $EMAIL           |
          | **Branch**  | \`$BRANCH\`      |
          | **SHA**     | \`${SHA:0:8}\`   |
          | **Data**    | $TIMESTAMP       |

          ## 📝 Commit
          > $COMMIT_MSG

          **Arquivos alterados:** $FILES

          ## 🤖 Análise de IA
          $AI_SUMMARY

          ## 📋 Status dos Checks
          | Check               | Status             |
          |---------------------|--------------------|
          | 🧹 Qualidade Código | $STATUS_QUALITY    |
          | 🛡️ Vulnerabilidades | $STATUS_SECURITY   |
          | 🔐 Segredos Expostos| $STATUS_SECRETS    |

          ---
          *Relatório gerado automaticamente em $(date -u '+%Y-%m-%d %H:%M UTC')*
          REPORT

      - name: Comentar no PR (se aplicável)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          AI_SUMMARY: ${{ steps.ai-summary.outputs.summary }}
          AUTHOR: ${{ needs.commit-metadata.outputs.author_name }}
          FILES: ${{ needs.commit-metadata.outputs.files_changed }}
          QUALITY_RESULT: ${{ needs.code-quality.result }}
          SECURITY_RESULT: ${{ needs.security-scan.result }}
          SECRETS_RESULT: ${{ needs.secrets-scan.result }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const q = process.env.QUALITY_RESULT === 'success' ? '✅' : '⚠️';
            const s = process.env.SECURITY_RESULT === 'success' ? '✅' : '⚠️';
            const sec = process.env.SECRETS_RESULT === 'success' ? '✅' : '⚠️';

            const body = `## 🔍 Relatório de Monitoramento de Commit

            **Autor:** ${process.env.AUTHOR} | **Arquivos:** ${process.env.FILES}

            ### 🤖 Análise Automática (IA)
            ${process.env.AI_SUMMARY}

            ### 📋 Checks
            | Check | Status |
            |-------|--------|
            | 🧹 Qualidade de Código | ${q} |
            | 🛡️ Vulnerabilidades | ${s} |
            | 🔐 Segredos Expostos | ${sec} |

            <sub>Gerado automaticamente por GitHub Actions · ${new Date().toISOString()}</sub>`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      # ─────────────────────────────────────────────
      # Notificação Discord
      # ─────────────────────────────────────────────
      - name: Notificar Discord
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          AUTHOR:         ${{ needs.commit-metadata.outputs.author_name }}
          EMAIL:          ${{ needs.commit-metadata.outputs.author_email }}
          BRANCH:         ${{ needs.commit-metadata.outputs.branch }}
          SHA:            ${{ needs.commit-metadata.outputs.commit_sha }}
          COMMIT_MSG:     ${{ needs.commit-metadata.outputs.commit_message }}
          FILES:          ${{ needs.commit-metadata.outputs.files_changed }}
          QUALITY_RESULT: ${{ needs.code-quality.result }}
          SECURITY_RESULT: ${{ needs.security-scan.result }}
          SECRETS_RESULT: ${{ needs.secrets-scan.result }}
          AI_SUMMARY:     ${{ steps.ai-summary.outputs.summary }}
          REPO:           ${{ github.repository }}
          RUN_URL:        ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ -z "$DISCORD_WEBHOOK_URL" ] && echo "DISCORD_WEBHOOK_URL nao configurado, pulando." && exit 0

          # Determina cor e status geral
          ALL_OK=true
          [ "$QUALITY_RESULT"  != "success" ] && ALL_OK=false
          [ "$SECURITY_RESULT" != "success" ] && ALL_OK=false
          [ "$SECRETS_RESULT"  != "success" ] && ALL_OK=false
          COLOR=3066993   # verde
          TITLE_EMOJI="✅"
          $ALL_OK || { COLOR=15158332; TITLE_EMOJI="⚠️"; }  # vermelho se houver falha

          # Badges de status
          badge(){ [ "$1" = "success" ] && echo "✅ passou" || echo "❌ falhou"; }
          Q=$(badge "$QUALITY_RESULT")
          S=$(badge "$SECURITY_RESULT")
          SEC=$(badge "$SECRETS_RESULT")

          # Resumo da IA (primeiras 800 chars para não estourar limite Discord)
          AI_SHORT=$(echo "$AI_SUMMARY" | head -c 800)
          [ ${#AI_SUMMARY} -gt 800 ] && AI_SHORT="${AI_SHORT}..."

          PAYLOAD=$(jq -nc             --arg title  "$TITLE_EMOJI Novo commit em ${REPO##*/}"             --arg author "$AUTHOR <$EMAIL>"             --arg branch "$BRANCH"             --arg sha    "${SHA:0:8}"             --arg msg    "$COMMIT_MSG"             --arg files  "$FILES arquivo(s) alterado(s)"             --arg ai     "$AI_SHORT"             --arg q      "$Q"             --arg s      "$S"             --arg sec    "$SEC"             --arg url    "$RUN_URL"             --argjson color "$COLOR"             '{
              embeds: [{
                title: $title,
                color: $color,
                url:   $url,
                fields: [
                  { name: "👤 Autor",       value: $author, inline: false },
                  { name: "🌿 Branch",      value: $branch, inline: true  },
                  { name: "🔖 SHA",         value: $sha,    inline: true  },
                  { name: "📝 Mensagem",    value: $msg,    inline: false },
                  { name: "📂 Alterações",  value: $files,  inline: false },
                  { name: "🤖 Análise IA",  value: $ai,     inline: false },
                  { name: "🧹 Qualidade",   value: $q,      inline: true  },
                  { name: "🛡️ Vulnerabilidades", value: $s, inline: true  },
                  { name: "🔐 Segredos",    value: $sec,    inline: true  }
                ],
                footer: { text: "GitHub Actions · \($title | ltrimstr("✅ ") | ltrimstr("⚠️ "))" },
                timestamp: (now | todate)
              }]
            }')

          HTTP=$(curl -s -o /tmp/discord_resp.txt -w "%{http_code}"             -X POST "$DISCORD_WEBHOOK_URL"             -H "Content-Type: application/json"             -d "$PAYLOAD")

          if [ "$HTTP" = "204" ]; then
            echo "Notificacao Discord enviada com sucesso (HTTP 204)"
          else
            echo "Aviso: Discord retornou HTTP $HTTP"
            cat /tmp/discord_resp.txt
          fi

  # ─────────────────────────────────────────────
  # JOB 6: SwiftLint (iOS) — runner macOS
  # Roda separado pois exige macos-latest
  # ─────────────────────────────────────────────
  swiftlint:
    name: 🍎 SwiftLint — Swift / iOS
    runs-on: macos-latest
    needs: commit-metadata
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verificar arquivos Swift
        id: check-swift
        run: |
          COUNT=$(find . -name "*.swift" -not -path "*/.github/*" -not -path "*/build/*" | wc -l)
          echo "swift_count=$COUNT" >> $GITHUB_OUTPUT
          echo "Arquivos Swift encontrados: $COUNT"

      - name: Instalar e rodar SwiftLint
        if: steps.check-swift.outputs.swift_count != '0'
        continue-on-error: true
        run: |
          echo "### 🍎 SwiftLint — Swift / iOS" >> $GITHUB_STEP_SUMMARY
          if ! command -v swiftlint &>/dev/null; then
            brew install swiftlint 2>/dev/null || true
          fi
          if command -v swiftlint &>/dev/null; then
            swiftlint lint --reporter github-actions-logging 2>&1 | head -50 >> $GITHUB_STEP_SUMMARY || true
            VIOLATIONS=$(swiftlint lint --quiet 2>/dev/null | wc -l || echo "0")
            echo "Total de ocorrencias: **$VIOLATIONS**" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ SwiftLint nao disponivel neste runner." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Resumo sem Swift
        if: steps.check-swift.outputs.swift_count == '0'
        run: |
          echo "### 🍎 SwiftLint — Swift / iOS" >> $GITHUB_STEP_SUMMARY
          echo "⏭️ Ignorado — nenhum arquivo .swift encontrado no repositorio." >> $GITHUB_STEP_SUMMARY
